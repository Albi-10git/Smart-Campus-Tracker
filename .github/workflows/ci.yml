name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          USE_MOCK_DB: "true"
          ARDUINO_ENABLED: "false"
          FLASK_DEBUG: "false"
        run: pytest tests/

      - name: Build Docker image
        run: docker build -t campus-tracker .

      - name: Run Docker container
        run: docker run -d --name campus-tracker-test -p 5000:5000 -e USE_MOCK_DB=true -e ARDUINO_ENABLED=false campus-tracker

      - name: Verify container is running
        run: docker ps

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: |
          docker tag campus-tracker ${{ env.DOCKER_USERNAME }}/campus-tracker:latest
          docker push ${{ env.DOCKER_USERNAME }}/campus-tracker:latest
