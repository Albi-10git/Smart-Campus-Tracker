name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  APP_PORT: "5000"
  CONTAINER_NAME: "smart-campus-tracker"
  IMAGE_NAME: "smart-campus-tracker"

jobs:
  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js for HTML/CSS/JS frontend tests
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend test dependencies
        run: npm install

      - name: Run frontend unit tests (Vitest)
        run: npm run test:frontend

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Flask backend tests
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend unit tests (Pytest)
        env:
          USE_MOCK_DB: "true"
          ARDUINO_ENABLED: "false"
          FLASK_DEBUG: "false"
        run: pytest tests/backend -q

  selenium-test:
    name: selenium-test
    runs-on: ubuntu-latest
    needs:
      - frontend-test
      - backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Selenium end-to-end tests
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend and Selenium dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium chromium-driver curl

      - name: Start Flask app (serves both backend APIs and HTML/CSS/JS frontend)
        env:
          USE_MOCK_DB: "true"
          ARDUINO_ENABLED: "false"
          FLASK_DEBUG: "false"
          FLASK_HOST: "127.0.0.1"
          PORT: ${{ env.APP_PORT }}
        run: |
          python app.py > flask.log 2>&1 &

      - name: Wait for application routes to be ready
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/login" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time."
          cat flask.log
          exit 1

      - name: Run Selenium tests in headless Chromium
        env:
          USE_MOCK_DB: "true"
          ARDUINO_ENABLED: "false"
          FLASK_DEBUG: "false"
          CHROME_BINARY_PATH: /usr/bin/chromium
          CHROMEDRIVER_PATH: /usr/bin/chromedriver
        run: pytest tests/e2e -q

      - name: Upload Flask log if Selenium tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flask-log
          path: flask.log

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: selenium-test
    permissions:
      contents: read
      packages: read

    outputs:
      can_push: ${{ steps.registry.outputs.can_push }}
      image_repo: ${{ steps.registry.outputs.image_repo }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker registry settings
        id: registry
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            echo "image_repo=${DOCKERHUB_USERNAME}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "image_repo=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.registry.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image for validation
        if: steps.registry.outputs.can_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image
        if: steps.registry.outputs.can_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.image_repo }}:latest
            ${{ steps.registry.outputs.image_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment settings
        id: deploy_check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ "${{ needs.docker-build.outputs.can_push }}" = "true" ] && [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$MONGO_URI" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy deployment script to remote host
        if: steps.deploy_check.outputs.can_deploy == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "scripts/deploy.sh"
          target: "/tmp/smart-campus-tracker"

      - name: Deploy latest Docker image over SSH
        if: steps.deploy_check.outputs.can_deploy == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REPO: ${{ needs.docker-build.outputs.image_repo }}
          IMAGE_TAG: latest
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.APP_PORT }}
          CONTAINER_PORT: "5000"
          MONGO_URI: ${{ secrets.MONGO_URI }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REPO,IMAGE_TAG,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,MONGO_URI
          script: |
            chmod +x /tmp/smart-campus-tracker/scripts/deploy.sh
            /tmp/smart-campus-tracker/scripts/deploy.sh
